name: Backend CI

on:
  push:
    branches: [dev,main]
  pull_request:
    branches: [main]

    
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    env:
      NODE_ENV: test
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          if [ -z "$MONGO_URI" ]; then
            echo "MONGO_URI secret is missing. Add it in GitHub Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    # 1) Run deployment only after CI job succeeds
    needs: lint-and-test

    # 2) Deploy only for direct pushes/merge commits on main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check SSH reachability
        env:
          HOST: ${{ secrets.EC2_HOST }}
          PORT: ${{ secrets.EC2_PORT || '22' }}
        run: |
          echo "Checking TCP connectivity to $HOST:$PORT"
          nc -zvw5 "$HOST" "$PORT"

      # 3) Open secure SSH session to EC2 using GitHub Secrets
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          port: ${{ secrets.EC2_PORT || '22' }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          script_stop: true
          script: |
            set -euo pipefail

            # 4) Move to backend directory on EC2
            APP_DIR="$HOME/shopsmart/server"
            cd "$APP_DIR"

            # 5) Pull latest main branch code in an idempotent way
            git fetch --all --prune
            git reset --hard origin/main

            # 6) Install/update dependencies
            npm install

            # Ensure pm2 is available in non-interactive shell sessions.
            if pm2 describe backend > /dev/null 2>&1; then
              pm2 restart backend
            else
              pm2 start src/index.js --name backend
            fi

            # 8) Persist PM2 process list for reboot recovery
            pm2 save
